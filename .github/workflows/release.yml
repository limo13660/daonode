name: Build and Release

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag，例如 v0.1.0；留空时只生成 Actions Artifacts"
        required: false
        type: string

jobs:

  test:
    runs-on: ubuntu-latest
    env:
      GOEXPERIMENT: jsonv2
    steps:
      - name: Validate release tag
        if: ${{ inputs.release_tag != '' }}
        run: |
          if [[ ! "${{ inputs.release_tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "release_tag must look like v0.1.0" >&2
            exit 1
          fi
      - name: Checkout codebase
        uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Run tests
        run: go test ./...

  build:
    needs: test
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, 386]
        include:
          # Linux ARM 5/6/7
          - goos: linux
            goarch: arm
            goarm: 7
          - goos: linux
            goarch: arm
            goarm: 6
          - goos: linux
            goarch: arm
            goarm: 5
          # Linux ARM64 and RISC-V
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: riscv64
          # Linux MIPS
          - goos: linux
            goarch: mips64
          - goos: linux
            goarch: mips64le
          - goos: linux
            goarch: mipsle
          - goos: linux
            goarch: mips
          # Linux PowerPC
          - goos: linux
            goarch: ppc64
          - goos: linux
            goarch: ppc64le
          # Linux S390X
          - goos: linux
            goarch: s390x
      fail-fast: false

    runs-on: ubuntu-latest
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      GOARM: ${{ matrix.goarm }}
      CGO_ENABLED: 0
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v5
      - name: Show workflow information
        id: get_filename
        run: |
          export _NAME=$(jq ".[\"$GOOS-$GOARCH$GOARM$GOMIPS\"].friendlyName" -r < .github/build/friendly-filenames.json)
          if [[ -z "$_NAME" || "$_NAME" == "null" ]]; then
            echo "No friendly filename for $GOOS-$GOARCH$GOARM$GOMIPS" >&2
            exit 1
          fi
          echo "GOOS: $GOOS, GOARCH: $GOARCH, GOARM: $GOARM, GOMIPS: $GOMIPS, RELEASE_NAME: $_NAME"
          echo "ASSET_NAME=$_NAME" >> $GITHUB_OUTPUT
          echo "ASSET_NAME=$_NAME" >> $GITHUB_ENV
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'

      - name: Get project dependencies
        run: |
          go mod download
      - name: Resolve build version
        run: |
          if [[ -n "${{ inputs.release_tag }}" ]]; then
            echo "version=${{ inputs.release_tag }}" >> $GITHUB_ENV
          else
            echo "version=${{ github.sha }}" >> $GITHUB_ENV
          fi
      - name: Build daonode
        run: |
          echo "version: $version"
          mkdir -p build_assets
          GOEXPERIMENT=jsonv2 go build -v -o build_assets/daonode -trimpath -ldflags "-X 'github.com/limo13660/daonode/cmd.version=$version' -s -w -buildid="

      - name: Build Mips softfloat daonode
        if: matrix.goarch == 'mips' || matrix.goarch == 'mipsle'
        run: |
          echo "version: $version"
          GOEXPERIMENT=jsonv2 GOMIPS=softfloat go build -v -o build_assets/daonode_softfloat -trimpath -ldflags "-X 'github.com/limo13660/daonode/cmd.version=$version' -s -w -buildid="
      - name: Prepare to release
        run: |
          cp ${GITHUB_WORKSPACE}/README.md ./build_assets/README.md
          cp ${GITHUB_WORKSPACE}/LICENSE ./build_assets/LICENSE
          cp ${GITHUB_WORKSPACE}/LICENSE-GPL-3.0 ./build_assets/LICENSE-GPL-3.0
          cp ${GITHUB_WORKSPACE}/THIRD_PARTY_NOTICES.md ./build_assets/THIRD_PARTY_NOTICES.md
          for data in geoip geosite; do
            curl -fL --retry 3 "https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/${data}.dat" -o "./build_assets/${data}.dat"
          done
      - name: Create ZIP archive
        shell: bash
        run: |
          pushd build_assets || exit 1
          touch -mt $(date +%Y01010000) *
          zip -9vr ../daonode-$ASSET_NAME.zip .
          popd || exit 1
          FILE=./daonode-$ASSET_NAME.zip
          DGST=$FILE.dgst
          for METHOD in {"md5","sha1","sha256","sha512"}
          do
            openssl dgst -$METHOD $FILE | sed 's/([^)]*)//g' >>$DGST
          done
      - name: Change the name
        run: |
          mv build_assets daonode-$ASSET_NAME
      - name: Upload files to Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: daonode-${{ steps.get_filename.outputs.ASSET_NAME }}
          path: |
            ./daonode-${{ steps.get_filename.outputs.ASSET_NAME }}/*
            ./daonode-${{ steps.get_filename.outputs.ASSET_NAME }}.zip*

  publish:
    if: ${{ inputs.release_tag != '' }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v7
        with:
          path: release-assets
          pattern: daonode-*
          merge-multiple: true
      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: release-assets/*.zip*
          tag: ${{ inputs.release_tag }}
          file_glob: true
          overwrite: true
